<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div class="container">
      <div class="checkbox-btn-group">
        <input type="checkbox" value="1" id="option-1" />
        <label for="option-1">
          <svg width="60" height="60">
            <defs>
              <filter
                id="pink-shadow"
                x="-50%"
                y="-50%"
                width="200%"
                height="200%"
              >
                <feDropShadow
                  dx="2"
                  dy="2"
                  stdDeviation="6"
                  flood-color="#e707f7"
                  flood-opacity="1"
                />
              </filter>
            </defs>
            <path
              class="unchecked"
              d="M18 30 L27 39 L44 22"
              fill="none"
              stroke-width="4"
              stroke-linecap="round"
              stroke-linejoin="round"
            />
            <g class="checked">
              <path
                class="pink"
                d="M18 30 L27 39 L44 22"
                fill="none"
                stroke-width="6"
                stroke-linecap="round"
                stroke-linejoin="round"
                filter="url(#pink-shadow)"
              />
              <path
                class="blue"
                d="M18 30 L27 39 L44 22"
                fill="none"
                stroke-width="6"
                stroke-linecap="round"
                stroke-linejoin="round"
              />
            </g>
          </svg>
          <span>Option one</span>
        </label>
      </div>

      <div class="checkbox-btn-group">
        <input type="checkbox" value="2" id="option-2" />
        <label for="option-2">
          <svg width="60" height="60">
            <path
              class="unchecked"
              d="M18 30 L27 39 L44 22"
              fill="none"
              stroke-width="4"
              stroke-linecap="round"
              stroke-linejoin="round"
            />
            <g class="checked">
              <path
                class="pink"
                d="M18 30 L27 39 L44 22"
                fill="none"
                stroke-width="6"
                stroke-linecap="round"
                stroke-linejoin="round"
                filter="url(#pink-shadow)"
              />
              <path
                class="blue"
                d="M18 30 L27 39 L44 22"
                fill="none"
                stroke-width="6"
                stroke-linecap="round"
                stroke-linejoin="round"
              />
            </g>
          </svg>
          <span>Option two</span>
        </label>
      </div>

      <div class="checkbox-btn-group">
        <input type="checkbox" value="3" id="option-3" />
        <label for="option-3">
          <svg width="60" height="60">
            <path
              class="unchecked"
              d="M18 30 L27 39 L44 22"
              fill="none"
              stroke-width="4"
              stroke-linecap="round"
              stroke-linejoin="round"
            />
            <g class="checked">
              <path
                class="pink"
                d="M18 30 L27 39 L44 22"
                fill="none"
                stroke-width="6"
                stroke-linecap="round"
                stroke-linejoin="round"
                filter="url(#pink-shadow)"
              />
              <path
                class="blue"
                d="M18 30 L27 39 L44 22"
                fill="none"
                stroke-width="6"
                stroke-linecap="round"
                stroke-linejoin="round"
              />
            </g>
          </svg>
          <span>Option three</span>
        </label>
      </div>
    </div>

    <script src="app.js"></script>
  </body>
</html>
